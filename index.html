<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Doby Temp Mail</title>

<style>

body{
font-family:Arial;
background:#0f172a;
margin:0;
color:white;
}

.header{
background:#111827;
padding:15px;
font-size:22px;
text-align:center;
font-weight:bold;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.emailbox{
background:#1e293b;
padding:15px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.email{
font-size:18px;
word-break:break-all;
}

.buttons button{
margin:5px;
padding:10px 15px;
border:none;
border-radius:5px;
background:#2563eb;
color:white;
cursor:pointer;
}

.inbox{
margin-top:20px;
}

.message{
background:#1e293b;
margin-top:10px;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.mailbody{
margin-top:10px;
background:#020617;
padding:10px;
border-radius:6px;
display:none;
}

</style>

</head>

<body>

<div class="header">
Doby Temp Mail
</div>

<div class="container">

<div class="emailbox">

<div class="email" id="email">
Generating...
</div>

<div class="buttons">

<button onclick="createEmail()">New</button>
<button onclick="copyEmail()">Copy</button>

</div>

</div>

<div class="inbox">

<h2>Inbox</h2>

<div id="messages">
No messages yet
</div>

</div>

</div>

<script>

let token=localStorage.getItem("token")
let email=localStorage.getItem("email")
let password="12345678"

if(email){
document.getElementById("email").innerText=email
loadMessages()
}else{
createEmail()
}

async function createEmail(){

let res=await fetch("https://api.mail.tm/domains")
let data=await res.json()

let domain=data["hydra:member"][0].domain

let login=Math.random().toString(36).substring(2,10)

email=login+"@"+domain

document.getElementById("email").innerText=email

await fetch("https://api.mail.tm/accounts",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
address:email,
password:password
})
})

let tokenRes=await fetch("https://api.mail.tm/token",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
address:email,
password:password
})
})

let tokenData=await tokenRes.json()

token=tokenData.token

localStorage.setItem("token",token)
localStorage.setItem("email",email)

loadMessages()

}

async function loadMessages(){

if(!token) return

let res=await fetch("https://api.mail.tm/messages",{
headers:{
Authorization:"Bearer "+token
}
})

let data=await res.json()

let box=document.getElementById("messages")

box.innerHTML=""

if(data["hydra:member"].length==0){
box.innerHTML="No messages yet"
return
}

data["hydra:member"].forEach(msg=>{

box.innerHTML+=`
<div class="message" onclick="readMail('${msg.id}')">

<b>From:</b> ${msg.from.address}<br>
<b>Subject:</b> ${msg.subject}

<div id="mail-${msg.id}" class="mailbody"></div>

</div>
`

})

}

async function readMail(id){

let res=await fetch("https://api.mail.tm/messages/"+id,{
headers:{
Authorization:"Bearer "+token
}
})

let data=await res.json()

let box=document.getElementById("mail-"+id)

box.style.display="block"

box.innerHTML=data.text || data.html

}

function copyEmail(){

navigator.clipboard.writeText(email)

alert("Email copied")

}

setInterval(()=>{
loadMessages()
},5000)

</script>

</body>

</html>
